services:
  pi-ginot-studio:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      # Mount checkpoint directory (avoids baking large weights into the image)
      - ./checkpoints:/app/checkpoints:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
